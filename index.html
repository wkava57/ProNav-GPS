<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Truck & Bus Pro Navigator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h1>🚚 ProNav GPS</h1>
            <p>Solutions Tous types de Véhicules</p>
        </div>
        
        <div class="section">
            <label>Type de véhicule</label>
            <select id="vehicleType" onchange="updateDefaults()">
                <optgroup label="Transport de Marchandises">
                    <option value="truck">Poids Lourd (Porteur / Semi)</option>
                    <option value="van">Fourgon / Utilitaire (VUL)</option>
                </optgroup>
                <optgroup label="Transport de Personnes">
                    <option value="bus">Autocar / Bus</option>
                    <option value="minibus">Minibus</option>
                </optgroup>
                <optgroup label="Loisirs & Spéciaux">
                    <option value="motorhome">Camping-car / Caravane</option>
                    <option value="emergency">Véhicule de Secours</option>
                </optgroup>
            </select>
        </div>

        <div class="specs-grid">
            <div class="input-group">
                <label>Hauteur (m)</label>
                <input type="number" id="height" value="4.0" step="0.1">
            </div>
            <div class="input-group">
                <label>Largeur (m)</label>
                <input type="number" id="width" value="2.5" step="0.1">
            </div>
            <div class="input-group">
                <label>PTAC du véhicule (t)</label>
                <input type="number" id="weight" value="12" step="0.5">
                <small style="font-size: 0.7rem; color: #95a5a6;">Référence F.2 sur la carte grise</small>
            </div>
            <div class="input-group">
                <label>Essieu Max (t)</label>
                <input type="number" id="axleLoad" value="8" step="0.5">
            </div>
        </div>

        <div class="section">
    <label>Classification ADR / Tunnel</label>
    <select id="adrCategory">
        <option value="none">Aucune marchandise dangereuse</option>
        <option value="b">Catégorie B (Risque d'explosion très important)</option>
        <option value="c">Catégorie C (Risque d'explosion ou fuite toxique)</option>
        <option value="d">Catégorie D (Risque d'incendie ou fuite liquide)</option>
        <option value="e">Catégorie E (Toutes marchandises dangereuses - Très restrictif)</option>
    </select>
    <small style="font-size: 0.7rem; color: #95a5a6;">Vérifiez le code tunnel sur votre document de transport.</small>
</div>

<div class="section">
    <label>Type de chargement</label>
    <select id="loadType">
        <option value="package">Colis / Conditionné</option>
        <option value="tank">Citerne (Plus de restrictions)</option>
        <option value="bulk">Vrac</option>
    </select>
</div>
    </div>

    <div id="map"></div>

    <script src="script.js"></script>
</body>
</html>
